apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit from k8s base
resources:
  - k8s/configmap.yaml
  - k8s/secret.yaml
  - k8s/redis.yaml
  - k8s/api.yaml
  - k8s/worker.yaml
  - k8s/pdb.yaml
  # OpenShift specific
  - project.yaml
  - imagestream.yaml
  - buildconfig.yaml
  - route.yaml


namespace: zabbix-mcp
commonLabels:
  app.kubernetes.io/part-of: zabbix-mcp
  app.kubernetes.io/version: "1.0.0"
  app.openshift.io/runtime: python

# Use OpenShift internal registry
images:
  - name: zabbix-mcp
    newName: image-registry.openshift-image-registry.svc:5000/zabbix-mcp/zabbix-mcp
    newTag: latest
  - name: redis
    newName: registry.redhat.io/rhel8/redis-6
    newTag: latest


patches:
  - path: patches.yaml

  # Remove specific runAsUser/fsGroup for OpenShift (it assigns from namespace range)
  - target:
      kind: Deployment
      name: zabbix-mcp-api
    patch: |-
      - op: remove
        path: /spec/template/spec/securityContext/runAsUser
      - op: remove
        path: /spec/template/spec/securityContext/fsGroup
  - target:
      kind: Deployment
      name: zabbix-mcp-worker
    patch: |-
      - op: remove
        path: /spec/template/spec/securityContext/runAsUser
      - op: remove
        path: /spec/template/spec/securityContext/fsGroup
  - target:
      kind: StatefulSet
      name: redis-master
    patch: |-
      - op: remove
        path: /spec/template/spec/securityContext/runAsUser
      - op: remove
        path: /spec/template/spec/securityContext/fsGroup
