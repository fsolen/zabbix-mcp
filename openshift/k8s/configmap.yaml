apiVersion: v1
kind: ConfigMap
metadata:
  name: zabbix-mcp-config
  namespace: zabbix-mcp
  labels:
    app.kubernetes.io/name: zabbix-mcp
    app.kubernetes.io/component: config
data:
  config.yaml: |
    mode:
      read_only: true

    # Multi-Server Zabbix Configuration
    # Her site için ayrı server tanımı
    # Credentials: ZABBIX_{SERVER}_USER, ZABBIX_{SERVER}_PASS (Secret'tan)
    servers:
      dc1:
        url: "https://zabbix-dc1.example.com/api_jsonrpc.php"
        timeout: 60
        max_retries: 3
        verify_ssl: true
      
      dc2:
        url: "https://zabbix-dc2.example.com/api_jsonrpc.php"
        timeout: 60
        max_retries: 3
        verify_ssl: true
      
      cloud:
        url: "https://zabbix-cloud.example.com/api_jsonrpc.php"
        timeout: 60
        max_retries: 3
        verify_ssl: true

    # Default server (server parametresi belirtilmezse)
    default_server: dc1

    redis:
      url: "redis://redis-master:6379/0"

    cache:
      ttl_sec: 900

    limits:
      max_hosts_per_query: 100
      max_items_per_query: 5000
      concurrent_groups: 3

    rate_limit:
      enabled: true
      max_requests: 60
      window_minutes: 1
      calls_per_second: 5

    worker:
      scan_interval_sec: 600
      metrics_port: 9090

    logging:
      level: INFO

    disabled_tags: []
    # disabled_tags: ["write", "maintenance", "script"]
