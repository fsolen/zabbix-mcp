apiVersion: v1
kind: ConfigMap
metadata:
  name: zabbix-mcp-config
  namespace: zabbix-mcp
  labels:
    app.kubernetes.io/name: zabbix-mcp
    app.kubernetes.io/component: config
data:
  config.yaml: |
    mode:
      read_only: true

    zabbix:
      url: "https://zabbix.example.com/api_jsonrpc.php"
      timeout: 60
      max_retries: 3

    redis:
      url: "redis://redis-master:6379/0"

    cache:
      ttl_sec: 900

    limits:
      max_hosts_per_query: 100
      max_items_per_query: 5000
      rate_limit_calls: 5
      rate_limit_period: 1
      concurrent_groups: 3

    worker:
      scan_interval_sec: 600
      metrics_port: 9090
