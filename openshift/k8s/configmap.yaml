apiVersion: v1
kind: ConfigMap
metadata:
  name: zabbix-mcp-config
  namespace: zabbix-mcp
  labels:
    app.kubernetes.io/name: zabbix-mcp
    app.kubernetes.io/component: config
data:
  config.yaml: |
    mode:
      read_only: true

    zabbix:
      url: "https://zabbix.example.com/api_jsonrpc.php"
      timeout: 60
      max_retries: 3
      verify_ssl: true
      skip_version_check: false

    redis:
      url: "redis://redis-master:6379/0"

    cache:
      ttl_sec: 900

    limits:
      max_hosts_per_query: 100
      max_items_per_query: 5000
      concurrent_groups: 3

    rate_limit:
      enabled: true
      max_requests: 60
      window_minutes: 1
      calls_per_second: 5

    worker:
      scan_interval_sec: 600
      metrics_port: 9090

    logging:
      level: INFO

    disabled_tags: []
    # disabled_tags: ["write", "maintenance", "script"]
