# ⚠️  Production'da SealedSecrets veya ExternalSecrets kullanın
# Bu dosya sadece template amaçlıdır
#
# Multi-Server Credentials:
# Her server için: ZABBIX_{SERVER}_USER, ZABBIX_{SERVER}_PASS
# Fallback olarak ZABBIX_USER, ZABBIX_PASS kullanılır
apiVersion: v1
kind: Secret
metadata:
  name: zabbix-mcp-secret
  namespace: zabbix-mcp
  labels:
    app.kubernetes.io/name: zabbix-mcp
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # Default/fallback credentials (tüm serverlar için)
  ZABBIX_USER: "api_user"
  ZABBIX_PASS: "changeme"
  
  # Server-specific credentials (opsiyonel)
  # Tanımlanmazsa ZABBIX_USER/ZABBIX_PASS kullanılır
  ZABBIX_DC1_USER: "api_user"
  ZABBIX_DC1_PASS: "changeme"
  
  ZABBIX_DC2_USER: "api_user"
  ZABBIX_DC2_PASS: "changeme"
  
  ZABBIX_CLOUD_USER: "api_user"
  ZABBIX_CLOUD_PASS: "changeme"
---
