apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zabbix-mcp

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - redis.yaml
  - api.yaml
  - worker.yaml
  - pdb.yaml
  # KEDA kurulu ise aç
  # - keda.yaml

commonLabels:
