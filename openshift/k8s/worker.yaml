apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-mcp-worker
  namespace: zabbix-mcp
  labels:
    app.kubernetes.io/name: zabbix-mcp
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zabbix-mcp
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zabbix-mcp
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 1001
        runAsNonRoot: true
        fsGroup: 1001
      serviceAccountName: zabbix-mcp
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: zabbix-mcp:latest
          imagePullPolicy: Always
          command: ["python", "-m", "app.worker_distributed"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: CONFIG_PATH
              value: /config/config.yaml
            - name: REDIS_URL
              value: redis://redis-master:6379/0
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ZABBIX_USER
              valueFrom:
                secretKeyRef:
                  name: zabbix-mcp-secret
                  key: ZABBIX_USER
            - name: ZABBIX_PASS
              valueFrom:
                secretKeyRef:
                  name: zabbix-mcp-secret
                  key: ZABBIX_PASS
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "16Gi"
              cpu: 8
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: zabbix-mcp-config
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: zabbix-mcp
                    app.kubernetes.io/component: worker
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: zabbix-mcp
              app.kubernetes.io/component: worker
