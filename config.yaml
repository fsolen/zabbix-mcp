import redis
import json
import httpx
import asyncio
from tenacity import retry, stop_after_attempt, wait_exponential
from prometheus_client import Counter, Histogram
import time

api_calls = Counter('zabbix_api_calls_total', 'Total API calls', ['method'])
api_latency = Histogram('zabbix_api_latency_seconds', 'API latency')

class RedisCache:
    def __init__(self, url, ttl):
        self.r = redis.Redis.from_url(url)
        self.ttl = ttl

    def set(self, key, value):
        self.r.setex(f"mcp:{key}", self.ttl, json.dumps(value))

    def get(self, key):
        val = self.r.get(f"mcp:{key}")
        return json.loads(val) if val else None

    def get_items_paginated(self, hostids, batch_size=1000):
        items = []
        offset = 0
        while True:
            batch = self.call("item.get", {
                "hostids": hostids,
                "output": ["itemid", "state", "status"],
                "limit": batch_size,
                "offset": offset
            })
            if not batch:
                break
            items.extend(batch)
            offset += batch_size
        return items

class AsyncZabbixClient:
    def __init__(self, cfg, semaphore_limit=10):
        self.url = cfg["url"]
        self.semaphore = asyncio.Semaphore(semaphore_limit)
        self.client = httpx.AsyncClient(
            http2=True,
            limits=httpx.Limits(max_keepalive_connections=20)
        )

    @retry(stop=stop_after_attempt(3), wait=wait_exponential(multiplier=1, max=10))
    async def call(self, method, params):
        async with self.semaphore:
            payload = {...}
            r = await self.client.post(self.url, json=payload)
            return r.json()["result"]

class DistributedRateLimiter:
    def __init__(self, redis_url, calls_per_sec):
        self.r = redis.Redis.from_url(redis_url)
        self.rate = calls_per_sec
        
    def acquire(self):
        # Redis INCR + EXPIRE based throttling
        key = f"rl:{int(time.time())}"
        count = self.r.incr(key)
        if count == 1:
            self.r.expire(key, 2)
        return count <= self.rate

