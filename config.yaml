# =============================================================================
# Zabbix MCP Configuration
# =============================================================================
# Bu dosya local development için örnek konfigürasyondur.
# OpenShift/K8s deployment'ta ConfigMap kullanılır.
# =============================================================================

# -----------------------------------------------------------------------------
# Çalışma Modu
# -----------------------------------------------------------------------------
mode:
  read_only: true              # true: yazma tool'ları gizlenir (güvenli)

# -----------------------------------------------------------------------------
# Zabbix API Bağlantısı
# -----------------------------------------------------------------------------
# Multi-Server Konfigürasyonu
# Her site için ayrı server tanımı yapılır.
# Environment variables: ZABBIX_{SERVER}_USER, ZABBIX_{SERVER}_PASS
# Örnek: ZABBIX_DC1_USER, ZABBIX_DC1_PASS
# Legacy format (zabbix:) da desteklenir.

servers:
  dc1:
    url: "https://zabbix-dc1.example.com/api_jsonrpc.php"
    timeout: 60
    max_retries: 3
    verify_ssl: true
  
  dc2:
    url: "https://zabbix-dc2.example.com/api_jsonrpc.php"
    timeout: 60
    max_retries: 3
    verify_ssl: true
  
  cloud:
    url: "https://zabbix-cloud.example.com/api_jsonrpc.php"
    timeout: 60
    max_retries: 3
    verify_ssl: true

# Default server (server parametresi belirtilmezse kullanılır)
default_server: dc1

# -----------------------------------------------------------------------------
# Redis Bağlantısı
# -----------------------------------------------------------------------------
redis:
  url: "redis://localhost:6379/0"

# -----------------------------------------------------------------------------
# Cache Ayarları
# -----------------------------------------------------------------------------
cache:
  ttl_sec: 900                 # Cache süresi (15 dakika)

# -----------------------------------------------------------------------------
# Sorgu Limitleri
# -----------------------------------------------------------------------------
limits:
  max_hosts_per_query: 100     # Tek sorguda max host
  max_items_per_query: 5000    # Tek sorguda max item
  concurrent_groups: 3         # Paralel grup işleme

# -----------------------------------------------------------------------------
# Rate Limiting (Zabbix API Koruması)
# -----------------------------------------------------------------------------
rate_limit:
  enabled: true
  max_requests: 60             # Dakikada max istek
  window_minutes: 1
  calls_per_second: 5          # Saniyede max API çağrısı

# -----------------------------------------------------------------------------
# Background Worker
# -----------------------------------------------------------------------------
worker:
  scan_interval_sec: 600       # Scan aralığı (10 dakika)
  metrics_port: 9090

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: INFO                  # DEBUG, INFO, WARNING, ERROR

# -----------------------------------------------------------------------------
# Tool Filtering (tag bazlı)
# -----------------------------------------------------------------------------
# Belirli tag'lere sahip tool'ları devre dışı bırakmak için kullanın.
# Örnek: ["write", "script", "maintenance"]
disabled_tags: []